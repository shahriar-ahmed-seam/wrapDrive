name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Assemble release APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/android/app/build/outputs/apk/release/*.apk

  web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @wrapdrive/web build
      - name: Package web bundle
        run: |
          cd apps/web/dist
          zip -r ../../../wrapdrive-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: wrapdrive-web.zip

  desktop:
    name: Build Electron installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @wrapdrive/desktop build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-installer
          path: apps/desktop/release/*.exe

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, web, desktop]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/web-bundle/*.zip
            artifacts/desktop-installer/*.exe
          generate_release_notes: true
