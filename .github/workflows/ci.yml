name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared:
    name: Shared packages (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  web:
    name: Web bundle
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @wrapdrive/web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: apps/web/dist

  desktop:
    name: Electron installers
    runs-on: windows-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @wrapdrive/desktop build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-installer
          path: apps/desktop/release

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Build APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Unit tests
        working-directory: apps/android
        run: ./gradlew testDebugUnitTest --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
